<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Notes</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    </head>

    <body>
        <nav class="navbar is-dark">
            <div class="navbar-brand">
                <a href="{% url 'view' %}" class="navbar-item">Notes</a>
            </div>

            <div class="navbar-menu">
                <div class="navbar-end">
                    <a href="{% url 'editor' 0 %}" class="navbar-item">New document</a>
                </div>
            </div>
        </nav>

        <section class="section">
            <div class="columns">
                <div class="column is-2">
                    <aside class="menu">
                        <p class="menu-label">Documents</p>

                        <ul class="menu-list">
                            {% for doc in documents %}
                                <li>
                                    <a href="{% url 'view_note' doc.id %}">{{ doc.title }}</a>
                                </li>
                            {% endfor %}
                        </ul>
                    </aside>
                </div>

                <div class="column is-10">
                    

                        <div class="field">
                            <label class="label">
                                Title

                                {% if document %}
                                    <span class="has-text-grey-light">
                                        Created at: {{ document.created_at|date:"m/d Y" }} / 
                                        Modified at: {{ document.modified_at|date:"m/d Y" }}
                                    </span>
                                {% endif %}
                            </label>

                            <div class="control">
                                <h1 name="title" placeholder="Title"{% if document %} value="{{ document.title }}"{% endif %}>{% if document %}{{document.title}}{% endif %}</h1>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Content</label>

                            <div class="control">
                                <p name="content" placeholder="Content">{% if document %}{{ document.content }}{% endif %}</p>
                            </div>
                        </div>

                        <div class="field is-grouped">
                            <div class="control">
                                <a href="{% url 'editor' docid %}"><button class="button is-primary">Edit</button></a>
                            </div>

# To delete a document
                             {% if document %}
                                <div class="control">
                                    <a href="{% url 'delete_document' docid %}" class="button is-danger">Delete</a>
                                </div>
                            {% endif %}

                        </div>
                </div>
            </div>
        </section>
    </body>
</html>
